<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - VONIKO Factory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            if (localStorage.getItem('sidebarCollapsed') === 'true') document.documentElement.classList.add('sidebar-collapsed');
            if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/i18n.js"></script>
    <style>
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .role-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(14, 165, 233, 0.15);
            color: var(--accent-primary);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 4px;
        }

        .permission-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--spacing-md);
        }

        .permission-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm);
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
        }

        .permission-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-primary);
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>用户管理</h1>
                    <span class="badge" id="totalCount">0 位用户</span>
                </div>
                <div class="page-actions">
                    <button class="btn btn-primary" onclick="openModal('addUserModal')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="8.5" cy="7" r="4" />
                            <line x1="20" y1="8" x2="20" y2="14" />
                            <line x1="23" y1="11" x2="17" y2="11" />
                        </svg>
                        添加用户
                    </button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="table-container">
                    <table class="table" id="usersTable">
                        <thead>
                            <tr>
                                <th>头像</th>
                                <th>用户名</th>
                                <th>姓名</th>
                                <th>邮箱</th>
                                <th>部门</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                            <tr>
                                <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                                    <div class="spinner" style="margin: 0 auto 1rem;"></div>
                                    加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Suppliers Section -->
            <div class="card" style="margin-top: var(--spacing-xl);">
                <div class="card-header">
                    <h3 class="card-title">供应商账户</h3>
                    <button class="btn btn-secondary" onclick="openModal('addSupplierModal')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="16" />
                            <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                        添加供应商
                    </button>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>供应商代码</th>
                                <th>名称</th>
                                <th>联系人</th>
                                <th>电话</th>
                                <th>邮箱</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="suppliersBody">
                            <tr>
                                <td colspan="7" style="text-align: center; color: var(--text-muted);">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Translation Management Section -->
            <div class="card" style="margin-top: var(--spacing-xl);">
                <div class="card-header">
                    <h3 class="card-title">翻译词条管理</h3>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-secondary" onclick="exportTranslations()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                            导出词条 CSV
                        </button>
                        <button class="btn btn-secondary" onclick="importTranslations()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="7 10 12 15 17 10" />
                                <line x1="12" y1="15" x2="12" y2="3" />
                            </svg>
                            导入词条 CSV
                        </button>
                    </div>
                </div>
                <div style="padding: var(--spacing-md); color: var(--text-secondary); font-size: 0.875rem;">
                    <p>• 点击"导出词条"下载当前所有翻译词条（CSV格式，含Key/Chinese/Vietnamese三列）</p>
                    <p>• 使用Excel编辑越南语翻译后，保存为CSV格式再导入</p>
                    <p>• 侧边栏可切换 CN ↔ VN 语言</p>
                </div>
            </div>

            <!-- Database Backup Section -->
            <div class="card" style="margin-top: var(--spacing-xl);" id="backupSection">
                <div class="card-header">
                    <h3 class="card-title">系统数据备份与还原</h3>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <span style="font-size: 0.875rem; color: var(--text-secondary);">自动备份频率:</span>
                        <select class="form-select" id="backupInterval" onchange="saveBackupConfig(this.value)"
                            style="width: auto; min-width: 150px; padding-top: 4px; padding-bottom: 4px; height: 32px;">
                            <option value="0">不自动备份</option>
                            <option value="6">每 6 小时</option>
                            <option value="12">每 12 小时</option>
                            <option value="24">每天 (24 小时)</option>
                            <option value="168">每 7 天</option>
                        </select>
                        <button class="btn btn-primary" onclick="createBackup()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                                <polyline points="17 21 17 13 7 13 7 21" />
                                <polyline points="7 3 7 8 15 8" />
                            </svg>
                            立刻手动备份
                        </button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>备份文件名</th>
                                <th>备份时间</th>
                                <th>文件大小</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="backupsBody">
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-muted);">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add User Modal -->
    <div class="modal-overlay" id="addUserModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3>添加新用户</h3>
                <button class="btn btn-icon" onclick="closeModal('addUserModal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md);">
                        <div class="form-group">
                            <label class="form-label">用户名 *</label>
                            <input type="text" class="form-input" name="username" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">密码 *</label>
                            <input type="password" class="form-input" name="password" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-input" name="full_name">
                        </div>
                        <div class="form-group">
                            <label class="form-label">越南语姓名</label>
                            <input type="text" class="form-input" name="full_name_vn">
                        </div>
                        <div class="form-group">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-input" name="email">
                        </div>
                        <div class="form-group">
                            <label class="form-label">部门</label>
                            <select class="form-select" name="department">
                                <option value="">请选择</option>
                                <option value="主线">主线</option>
                                <option value="正极">正极</option>
                                <option value="负极">负极</option>
                                <option value="配件">配件</option>
                                <option value="IT">IT</option>
                                <option value="采购">采购</option>
                                <option value="仓库">仓库</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addUserModal')">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>

    <!-- Add Supplier Modal -->
    <div class="modal-overlay" id="addSupplierModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3>添加供应商</h3>
                <button class="btn btn-icon" onclick="closeModal('addSupplierModal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="addSupplierForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md);">
                        <div class="form-group">
                            <label class="form-label">供应商代码 *</label>
                            <input type="text" class="form-input" name="code" required placeholder="用于登录门户">
                        </div>
                        <div class="form-group">
                            <label class="form-label">密码 *</label>
                            <input type="password" class="form-input" name="password" required>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label class="form-label">供应商名称 *</label>
                            <input type="text" class="form-input" name="name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系人</label>
                            <input type="text" class="form-input" name="contact_person">
                        </div>
                        <div class="form-group">
                            <label class="form-label">电话</label>
                            <input type="text" class="form-input" name="phone">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-input" name="email">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addSupplierModal')">取消</button>
                <button class="btn btn-primary" onclick="saveSupplier()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script>
        checkAuth();

        async function loadUsers() {
            try {
                const users = await api.get('/auth/users');
                document.getElementById('totalCount').textContent = `${users.length} 位用户`;

                const tbody = document.getElementById('usersBody');
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">暂无用户</td></tr>';
                } else {
                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td>
                                <div class="user-avatar">${(u.full_name || u.username).charAt(0).toUpperCase()}</div>
                            </td>
                            <td><strong>${u.username}</strong></td>
                            <td>${u.full_name || '-'}</td>
                            <td>${u.email || '-'}</td>
                            <td>${u.department || '-'}</td>
                            <td>
                                <span class="badge ${u.is_active ? 'badge-success' : 'badge-danger'}">
                                    ${u.is_active ? '启用' : '禁用'}
                                </span>
                                ${u.is_superuser ? '<span class="role-tag">管理员</span>' : ''}
                            </td>
                            <td>
                                <button class="btn btn-icon" onclick="editUser(${u.id})" title="编辑">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                showToast('加载用户失败: ' + error.message, 'error');
            }
        }

        async function loadSuppliers() {
            try {
                const suppliers = await api.get('/orders/suppliers/all');
                const tbody = document.getElementById('suppliersBody');

                if (suppliers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">暂无供应商</td></tr>';
                } else {
                    tbody.innerHTML = suppliers.map(s => `
                        <tr>
                            <td><strong>${s.code}</strong></td>
                            <td>${s.name}</td>
                            <td>${s.contact_person || '-'}</td>
                            <td>${s.phone || '-'}</td>
                            <td>${s.email || '-'}</td>
                            <td><span class="badge ${s.is_active ? 'badge-success' : 'badge-danger'}">${s.is_active ? '启用' : '禁用'}</span></td>
                            <td>
                                <button class="btn btn-icon" onclick="resetSupplierPassword(${s.id}, '${s.code}')" title="重置密码">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                                    </svg>
                                </button>
                                <button class="btn btn-icon" onclick="toggleSupplierStatus(${s.id}, ${s.is_active})" title="${s.is_active ? '禁用' : '启用'}">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${s.is_active ? 'var(--color-warning)' : 'var(--color-success)'}" stroke-width="2">
                                        ${s.is_active ? '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>' : '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'}
                                    </svg>
                                </button>
                                <button class="btn btn-icon" onclick="deleteSupplier(${s.id}, '${s.code}')" title="删除" style="color: var(--color-danger);">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Load suppliers error:', error);
            }
        }

        async function saveUser() {
            const form = document.getElementById('addUserForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                await api.post('/auth/register', data);
                showToast('用户创建成功');
                closeModal('addUserModal');
                form.reset();
                loadUsers();
            } catch (error) {
                showToast('创建失败: ' + error.message, 'error');
            }
        }

        async function saveSupplier() {
            const form = document.getElementById('addSupplierForm');
            const formData = new FormData(form);
            const params = new URLSearchParams(formData).toString();

            try {
                const response = await fetch(`/api/orders/suppliers?${params}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (response.ok) {
                    showToast('供应商创建成功');
                    closeModal('addSupplierModal');
                    form.reset();
                    loadSuppliers();
                } else {
                    const error = await response.json();
                    showToast('创建失败: ' + error.detail, 'error');
                }
            } catch (error) {
                showToast('创建失败: ' + error.message, 'error');
            }
        }

        function editUser(id) {
            showToast('编辑功能开发中', 'warning');
        }

        async function resetSupplierPassword(id, code) {
            const newPassword = prompt(`请输入供应商 ${code} 的新密码:`);
            if (!newPassword) return;

            try {
                await api.put(`/orders/suppliers/${id}/password`, { password: newPassword });
                showToast(`供应商 ${code} 密码已重置`);
            } catch (error) {
                showToast('重置失败: ' + error.message, 'error');
            }
        }

        async function toggleSupplierStatus(id, isActive) {
            const action = isActive ? '禁用' : '启用';
            if (!confirm(`确定要${action}此供应商吗？`)) return;

            try {
                await api.put(`/orders/suppliers/${id}/status`, { is_active: !isActive });
                showToast(`供应商已${action}`);
                loadSuppliers();
            } catch (error) {
                showToast('操作失败: ' + error.message, 'error');
            }
        }

        async function deleteSupplier(id, code) {
            if (!confirm(`确定要删除供应商 ${code} 吗？此操作不可恢复！`)) return;

            try {
                await api.delete(`/orders/suppliers/${id}`);
                showToast('供应商已删除');
                loadSuppliers();
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        async function deleteUser(id, username) {
            if (!confirm(`确定要删除用户 ${username} 吗？`)) return;

            try {
                await api.delete(`/auth/users/${id}`);
                showToast('用户已删除');
                loadUsers();
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        async function loadBackupConfig() {
            try {
                const config = await api.get('/backup/config');
                const select = document.getElementById('backupInterval');
                if (select) {
                    select.value = config.interval_hours.toString();
                }
            } catch (error) {
                console.error("加载备份配置失败:", error);
            }
        }

        async function saveBackupConfig(intervalHours) {
            try {
                await api.post(`/backup/config?interval_hours=${intervalHours}`);
                showToast('自动备份频率已保存');
            } catch (error) {
                showToast('保存备份频率失败: ' + error.message, 'error');
                // Revert to original
                loadBackupConfig();
            }
        }

        async function loadBackups() {
            try {
                const backups = await api.get('/backup/list');
                const tbody = document.getElementById('backupsBody');

                if (backups.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">暂无备份文件</td></tr>';
                } else {
                    tbody.innerHTML = backups.map(b => `
                        <tr>
                            <td><strong>${b.filename}</strong></td>
                            <td>${new Date(b.created_at).toLocaleString('zh-CN')}</td>
                            <td>${(b.size_bytes / 1024 / 1024).toFixed(2)} MB</td>
                            <td>
                                <button class="btn btn-sm" onclick="restoreBackup('${b.filename}')" style="margin-right: 8px;">还原系统</button>
                                <button class="btn btn-sm btn-icon" onclick="deleteBackup('${b.filename}')" title="删除备份" style="color: var(--color-danger);">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    </svg>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                const tbody = document.getElementById('backupsBody');
                if (error.status === 403) {
                    document.getElementById('backupSection').style.display = 'none';
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--color-danger);">加载失败: ${error.message}</td></tr>`;
                }
            }
        }

        async function createBackup() {
            // Show loading toast
            showToast('正在创建备份，请稍候...', 'info');
            try {
                await api.post('/backup/create');
                showToast('手动备份创建成功', 'success');
                loadBackups();
            } catch (error) {
                showToast('备份创建失败: ' + error.message, 'error');
            }
        }

        async function restoreBackup(filename) {
            if (!confirm(`【高危操作警告】\n\n确定要将系统数据还原到备份文件 "${filename}" 吗？\n\n当前数据库的所有数据将被此备份文件覆盖，此过程不可逆！`)) return;

            showToast('正在还原数据，请勿刷新页面...', 'warning');
            try {
                await api.post(`/backup/restore/${filename}`);
                alert('系统还原成功！为了确保所有连接重置，建议刷新页面或重启服务。');
                window.location.reload();
            } catch (error) {
                showToast('还原失败: ' + error.message, 'error');
            }
        }

        async function deleteBackup(filename) {
            if (!confirm(`确定要删除历史备份 "${filename}" 吗？`)) return;

            try {
                await api.delete(`/backup/${filename}`);
                showToast('备份文件已删除');
                loadBackups();
            } catch (error) {
                showToast('删除备份失败: ' + error.message, 'error');
            }
        }

        loadUsers();
        loadSuppliers();
        loadBackupConfig();
        loadBackups();
    </script>
</body>

</html>
