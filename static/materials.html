        });

    </script>
    <script>
        // --- Tag Input System ---
        const TagStateManager = {
            state: {},

            init(fieldId, initialValue) {
                const values = initialValue ? initialValue.split(',').filter(v => v.trim()) : [];
                this.state[fieldId] = new Set(values);
                this.render(fieldId);
                this.updateHiddenInput(fieldId);
            },

            add(fieldId, value) {
                if (!value || !value.trim()) return;
                const cleanValue = value.trim();
                if (!this.state[fieldId]) this.state[fieldId] = new Set();
                this.state[fieldId].add(cleanValue);
                this.updateHiddenInput(fieldId);
                this.render(fieldId);
            },

            remove(fieldId, value) {
                if (!this.state[fieldId]) return;
                this.state[fieldId].delete(value);
                this.updateHiddenInput(fieldId);
                this.render(fieldId);
            },

            updateHiddenInput(fieldId) {
                const input = document.getElementById(fieldId);
                if (input) {
                    input.value = Array.from(this.state[fieldId] || []).join(',');
                }
            },

            render(fieldId) {
                const fieldName = fieldId.replace('edit_', '');
                const container = document.getElementById(`tag_container_${fieldName}`);
                const inputField = document.getElementById(`tag_input_${fieldName}`);

                if (!container || !inputField) return;

                // Remove existing badges
                const badges = container.querySelectorAll('.tag-badge');
                badges.forEach(b => b.remove());

                // Create new badges
                const values = Array.from(this.state[fieldId] || []).sort();
                values.forEach(v => {
                    const badge = document.createElement('div');
                    badge.className = 'tag-badge';
                    const vEscaped = v.replace(/'/g, "\\'");
                    badge.innerHTML = `<span>${v}</span><span class="remove-tag" onclick="TagStateManager.remove('${fieldId}', '${vEscaped}')">×</span>`;
                    container.insertBefore(badge, inputField);
                });
            }
        };

        function setupTagInput(fieldName) {
            const input = document.getElementById(`tag_input_${fieldName}`);
            const fieldId = `edit_${fieldName}`;

            if (!input) return;

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    TagStateManager.add(fieldId, input.value);
                    input.value = '';
                }
            });

            input.addEventListener('change', (e) => {
                if (input.value) {
                    TagStateManager.add(fieldId, input.value);
                    input.value = '';
                }
            });

            // Focus container -> focus input
            const container = document.getElementById(`tag_container_${fieldName}`);
            if (container) {
                container.addEventListener('click', (e) => {
                    if (e.target === container) input.focus();
                });
            }
        }

        // Initialize tag inputs once
        setupTagInput('workshop');
        setupTagInput('equipment');

        // Load config dropdowns for filter bar on page load
        loadConfigDropdowns();

        // Check for editId query parameter (from orders.html click)
        (function () {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('editId');
            if (editId) {
                // Wait for page to load, then open edit modal
                setTimeout(() => {
                    editMaterial(parseInt(editId));
                }, 500);
            }
        })();
    </script>
    <script>
        // ===== Material Notes CRUD =====
        async function loadNotesForDetail(materialId) {
            const container = document.getElementById(`materialNotesList${materialId}`);
            if (!container) return;
            try {
                const notes = await api.get(`/materials/${materialId}/notes`);

                }

                        <button class="btn btn-icon" onclick="editNoteInline(${n.id}, '${n.content.replace(/'/g, "\\'").replace(/\n/g, ' ')}', ${materialId})" style="padding: 2px;" title="编辑">

                        </button>
                        <button class="btn btn-icon" onclick="deleteNote(${n.id}, ${materialId})" style="padding: 2px; color: var(--color-danger);" title="删除">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = '<p style="color: var(--color-danger);">加载失败</p>';
            }
        }

        function addNoteInline(materialId) {
            const container = document.getElementById(`materialNotesList${materialId}`);
            if (!container) return;
            // Check if there's already an add form
            if (document.getElementById('newNoteForm')) return;
            const formHtml = `
                <div id="newNoteForm" style="display: flex; gap: 0.5rem; padding: 0.5rem 0;">
                    <input type="text" id="newNoteInput" class="form-input" placeholder="输入新的说明..." style="flex: 1; font-size: 0.85rem;" autofocus>
                    <button class="btn btn-primary btn-sm" onclick="saveNewNote(${materialId})" style="padding: 0.3rem 0.6rem;">保存</button>
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('newNoteForm').remove()" style="padding: 0.3rem 0.6rem;">取消</button>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', formHtml);
            document.getElementById('newNoteInput').focus();
        }

        async function saveNewNote(materialId) {
            const input = document.getElementById('newNoteInput');
            const content = input?.value.trim();
            if (!content) { showToast('请输入说明内容', 'warning'); return; }
            try {
                await api.post(`/materials/${materialId}/notes`, { content });
                showToast('说明已添加');
                loadNotesForDetail(materialId);
            } catch (e) {
                showToast('添加失败: ' + e.message, 'error');
            }
        }

                await api.put(`/materials/notes/${noteId}`, { content });
