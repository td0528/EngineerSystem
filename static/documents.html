<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资料管理 - VONIKO Factory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            if (localStorage.getItem('sidebarCollapsed') === 'true') document.documentElement.classList.add('sidebar-collapsed');
            if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/i18n.js"></script>
    <style>
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-lg);
        }

        .doc-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            transition: all var(--transition-normal);
            cursor: pointer;
        }

        .doc-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .doc-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-md);
        }

        .doc-icon.pdf {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .doc-icon.word {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .doc-icon.excel {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .doc-icon.image {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }

        .doc-icon.other {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }

        .doc-title {
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .doc-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-2xl);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-bottom: var(--spacing-xl);
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(14, 165, 233, 0.05);
        }

        .upload-zone svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: var(--spacing-md);
        }

        .version-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .version-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
        }

        .version-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>资料管理</h1>
                    <span class="badge" id="totalCount">0 份文档</span>
                </div>
            </div>

            <!-- Upload Zone -->
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileUpload').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                <div style="font-size: 1.125rem; margin-bottom: var(--spacing-xs);">点击或拖拽上传文档</div>
                <div style="color: var(--text-muted);">支持 PDF、Word、Excel 等格式</div>
                <input type="file" id="fileUpload" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png"
                    style="display: none;" onchange="uploadDocument(this)">
            </div>

            <!-- Filter -->
            <div class="filter-bar">
                <div class="search-box" style="flex: 1;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" class="form-input" id="searchInput" placeholder="全文搜索文档内容..."
                        oninput="debouncedSearch()">
                </div>
                <select class="form-select" id="categoryFilter" onchange="loadDocuments()">
                    <option value="">所有分类</option>
                    <option value="技术文档">技术文档</option>
                    <option value="操作手册">操作手册</option>
                    <option value="培训资料">培训资料</option>
                    <option value="报告">报告</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <!-- Documents Grid -->
            <div class="documents-grid" id="documentsGrid">
                <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                    <div class="spinner" style="margin: 0 auto 1rem;"></div>
                    加载中...
                </div>
            </div>
        </main>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal" style="max-width: 500px;">
            <div class="modal-header">
                <h3>上传文档</h3>
                <button class="btn btn-icon" onclick="closeModal('uploadModal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="uploadForm">
                    <div class="form-group">
                        <label class="form-label">文档标题 *</label>
                        <input type="text" class="form-input" id="docTitle" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select class="form-select" id="docCategory">
                            <option value="技术文档">技术文档</option>
                            <option value="操作手册">操作手册</option>
                            <option value="培训资料">培训资料</option>
                            <option value="报告">报告</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <textarea class="form-textarea" id="docDescription" rows="3"></textarea>
                    </div>
                    <input type="hidden" id="pendingFile">
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('uploadModal')">取消</button>
                <button class="btn btn-primary" onclick="submitUpload()">上传</button>
            </div>
        </div>
    </div>

    <!-- Document Detail Modal -->
    <div class="modal-overlay" id="docDetailModal">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h3 id="docDetailTitle">文档详情</h3>
                <button class="btn btn-icon" onclick="closeModal('docDetailModal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="docDetailContent"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script>
        checkAuth();

        const debouncedSearch = debounce(() => loadDocuments(), 300);
        let pendingFileData = null;

        // Drag and drop
        const uploadZone = document.getElementById('uploadZone');

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        function uploadDocument(input) {
            if (input.files && input.files[0]) {
                handleFileSelect(input.files[0]);
            }
        }

        function handleFileSelect(file) {
            pendingFileData = file;
            document.getElementById('docTitle').value = file.name.replace(/\.[^/.]+$/, '');
            openModal('uploadModal');
        }

        async function submitUpload() {
            if (!pendingFileData) return;

            const title = document.getElementById('docTitle').value;
            const category = document.getElementById('docCategory').value;
            const description = document.getElementById('docDescription').value;

            if (!title) {
                showToast('请输入文档标题', 'warning');
                return;
            }

            const formData = new FormData();
            formData.append('file', pendingFileData);
            formData.append('title', title);
            formData.append('category', category);
            formData.append('description', description);

            try {
                await api.upload('/documents', formData);
                showToast('文档上传成功');
                closeModal('uploadModal');
                pendingFileData = null;
                document.getElementById('uploadForm').reset();
                loadDocuments();
            } catch (error) {
                showToast('上传失败: ' + error.message, 'error');
            }
        }

        async function loadDocuments() {
            const search = document.getElementById('searchInput').value;
            const category = document.getElementById('categoryFilter').value;
            const container = document.getElementById('documentsGrid');

            try {
                let url = '/documents?limit=50';
                if (search) url += `&search=${encodeURIComponent(search)}`;
                if (category) url += `&category=${encodeURIComponent(category)}`;

                const data = await api.get(url);
                document.getElementById('totalCount').textContent = `${data.total} 份文档`;

                if (data.items.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem;">暂无文档</div>';
                } else {
                    container.innerHTML = data.items.map(doc => `
                        <div class="doc-card" onclick="viewDocument(${doc.id})">
                            <div class="doc-icon ${getDocType(doc.file_path)}">
                                ${getDocIcon(doc.file_path)}
                            </div>
                            <div class="doc-title">${doc.title}</div>
                            <div class="doc-meta">
                                <span class="badge badge-info">${doc.category || '未分类'}</span>
                                <span style="margin-left: 8px;">${formatDate(doc.created_at)}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                showToast('加载失败: ' + error.message, 'error');
            }
        }

        function getDocType(path) {
            if (!path) return 'other';
            const ext = path.split('.').pop().toLowerCase();
            if (ext === 'pdf') return 'pdf';
            if (['doc', 'docx'].includes(ext)) return 'word';
            if (['xls', 'xlsx'].includes(ext)) return 'excel';
            if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) return 'image';
            return 'other';
        }

        function getDocIcon(path) {
            const type = getDocType(path);
            const icons = {
                pdf: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 3v5h5"/></svg>',
                word: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 3v5h5"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>',
                excel: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>',
                image: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
                other: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 3v5h5"/></svg>'
            };
            return icons[type];
        }

        async function viewDocument(id) {
            try {
                const doc = await api.get(`/documents/${id}`);

                document.getElementById('docDetailTitle').textContent = doc.title;
                document.getElementById('docDetailContent').innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-lg); margin-bottom: var(--spacing-xl);">
                        <div><div style="color: var(--text-muted); font-size: 0.875rem;">分类</div><div><span class="badge badge-info">${doc.category || '未分类'}</span></div></div>
                        <div><div style="color: var(--text-muted); font-size: 0.875rem;">上传时间</div><div>${formatDateTime(doc.created_at)}</div></div>
                        <div><div style="color: var(--text-muted); font-size: 0.875rem;">当前版本</div><div>v${doc.current_version}</div></div>
                        <div><div style="color: var(--text-muted); font-size: 0.875rem;">上传者</div><div>${doc.uploader?.full_name || doc.uploader?.username || '-'}</div></div>
                    </div>
                    
                    ${doc.description ? `<div style="margin-bottom: var(--spacing-xl);"><div style="color: var(--text-muted); font-size: 0.875rem;">描述</div><p>${doc.description}</p></div>` : ''}
                    
                    <div style="margin-bottom: var(--spacing-xl);">
                        <a href="${doc.file_path}" target="_blank" class="btn btn-primary">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            下载文档
                        </a>
                    </div>
                    
                    ${doc.versions && doc.versions.length > 1 ? `
                        <div>
                            <h4 style="margin-bottom: var(--spacing-md);">版本历史</h4>
                            <div class="version-list">
                                ${doc.versions.map(v => `
                                    <div class="version-item">
                                        <div>
                                            <div>v${v.version_number}</div>
                                            <div style="font-size: 0.875rem; color: var(--text-muted);">${formatDateTime(v.created_at)}</div>
                                        </div>
                                        <a href="${v.file_path}" target="_blank" class="btn btn-icon">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                                <polyline points="7 10 12 15 17 10"/>
                                                <line x1="12" y1="15" x2="12" y2="3"/>
                                            </svg>
                                        </a>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                `;

                openModal('docDetailModal');
            } catch (error) {
                showToast('加载失败: ' + error.message, 'error');
            }
        }

        loadDocuments();
    </script>
</body>

</html>
