<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - VONIKO Factory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            if (localStorage.getItem('sidebarCollapsed') === 'true') document.documentElement.classList.add('sidebar-collapsed');
            if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/i18n.js"></script>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <h1>仪表盘</h1>
                    <span class="badge" id="currentUser">管理员</span>
                </div>
                <div class="page-actions">
                    <button class="btn btn-secondary" onclick="refreshData()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6" />
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                        </svg>
                        刷新数据
                    </button>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalMaterials">0</div>
                    <div class="stat-label">物料总数</div>
                    <div class="stat-change positive">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                        </svg>
                        <span>活跃管理中</span>
                    </div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value" id="pendingOrders">0</div>
                    <div class="stat-label">待处理订单</div>
                    <div class="stat-change">
                        <span>需要跟进</span>
                    </div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value" id="lowStockItems">0</div>
                    <div class="stat-label">库存预警</div>
                    <div class="stat-change negative">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                        </svg>
                        <span>需补货</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="activeTasks">0</div>
                    <div class="stat-label">进行中任务</div>
                    <div class="stat-change">
                        <span>本周任务</span>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="card" style="margin-bottom: var(--spacing-xl);">
                <div class="card-header">
                    <h3 class="card-title">快速操作</h3>
                </div>
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--spacing-md);">
                    <a href="/static/orders.html?action=new" class="btn btn-secondary"
                        style="padding: var(--spacing-lg);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="16" />
                            <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                        新建采购订单
                    </a>
                    <a href="/static/warehouse.html?action=inbound" class="btn btn-secondary"
                        style="padding: var(--spacing-lg);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <path d="M12 22V12M8 16l4-4 4 4" />
                        </svg>
                        入库操作
                    </a>
                    <a href="/static/warehouse.html?action=outbound" class="btn btn-secondary"
                        style="padding: var(--spacing-lg);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <path d="M12 12v10M8 18l4 4 4-4" />
                        </svg>
                        出库操作
                    </a>
                    <a href="/static/tasks.html?action=new" class="btn btn-secondary"
                        style="padding: var(--spacing-lg);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="12" y1="11" x2="12" y2="17" />
                            <line x1="9" y1="14" x2="15" y2="14" />
                        </svg>
                        发布新任务
                    </a>
                    <a href="/static/records.html?action=new" class="btn btn-secondary"
                        style="padding: var(--spacing-lg);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                        快速记录
                    </a>
                    <a href="/static/documents.html?action=upload" class="btn btn-secondary"
                        style="padding: var(--spacing-lg);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        上传资料
                    </a>
                </div>
            </div>

            <!-- Recent Activity -->
            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: var(--spacing-xl);">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">最近采购订单</h3>
                        <a href="/static/orders.html" class="btn btn-secondary">查看全部</a>
                    </div>
                    <div class="table-container" id="recentOrdersTable">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>PO号</th>
                                    <th>供应商</th>
                                    <th>状态</th>
                                    <th>日期</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="4" style="text-align: center; color: var(--text-muted);">
                                        暂无数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">待处理任务</h3>
                        <a href="/static/tasks.html" class="btn btn-secondary">查看全部</a>
                    </div>
                    <div class="table-container" id="pendingTasksTable">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>任务</th>
                                    <th>优先级</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="3" style="text-align: center; color: var(--text-muted);">
                                        暂无数据
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        // Check authentication
        checkAuth();

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Load materials count
                const materialsRes = await api.get('/materials?limit=1');
                document.getElementById('totalMaterials').textContent = materialsRes.total || 0;

                // Load pending orders
                const ordersRes = await api.get('/orders?status=已提交&limit=5');
                document.getElementById('pendingOrders').textContent = ordersRes.total || 0;
                updateOrdersTable(ordersRes.items || []);

                // Load low stock items
                const stockRes = await api.get('/warehouse/stock?low_stock=true&limit=1');
                document.getElementById('lowStockItems').textContent = stockRes.total || 0;

                // Load active tasks
                const tasksRes = await api.get('/tasks?status=进行中&limit=5');
                document.getElementById('activeTasks').textContent = tasksRes.total || 0;
                updateTasksTable(tasksRes.items || []);

            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function updateOrdersTable(orders) {
            const tbody = document.querySelector('#recentOrdersTable tbody');
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td><a href="/static/orders.html?id=${order.id}">${order.po_number}</a></td>
                    <td>${order.supplier?.name || '-'}</td>
                    <td><span class="badge badge-${getStatusClass(order.status)}">${order.status}</span></td>
                    <td>${formatDate(order.order_date)}</td>
                </tr>
            `).join('');
        }

        function updateTasksTable(tasks) {
            const tbody = document.querySelector('#pendingTasksTable tbody');
            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-muted);">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = tasks.map(task => `
                <tr>
                    <td><a href="/static/tasks.html?id=${task.id}">${task.title}</a></td>
                    <td><span class="badge badge-${getPriorityClass(task.priority)}">${task.priority}</span></td>
                    <td><span class="badge badge-${getStatusClass(task.status)}">${task.status}</span></td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            const classes = {
                '待认领': 'warning',
                '进行中': 'info',
                '已完成': 'success',
                '已提交': 'info',
                '部分到货': 'warning'
            };
            return classes[status] || 'neutral';
        }

        function getPriorityClass(priority) {
            const classes = {
                '紧急': 'danger',
                '高': 'warning',
                '普通': 'info',
                '低': 'neutral'
            };
            return classes[priority] || 'neutral';
        }

        function refreshData() {
            loadDashboard();
            showToast('数据已刷新', 'success');
        }

        // Load on page load
        loadDashboard();

        // Display current user
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('currentUser').textContent = user.full_name || user.username || '用户';
    </script>
</body>

</html>
